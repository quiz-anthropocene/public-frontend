- id: 90
  name: La clef des sols
  slug: les-sols
  introduction: "<p>Pour reprendre le titre d'un livre phare sur le sujet, les sols\
    \ sont <em>l’<a href=\"https://www.actes-sud.fr/catalogue/sciences-humaines-et-sociales-sciences/lorigine-du-monde\"\
    >origine du monde</a>.</em> Pourtant, ignorants de leur nature et de leur richesse,\
    \ les hommes ont souvent fortement dégradé leur fonctionnement, notamment via\
    \ leurs pratiques agricoles. Ce quiz va vous emmener à la découverte des mécanismes\
    \ qui font la vie, la dégadation, mais aussi la régénération des sols.</p>\r\n\
    \r\n<p>Un quiz élaboré par Romaric Vincent, agronome agroforestier et passionné\
    \ des sols</p>"
  conclusion: <p>Les sols n'ont pas fini de nous surprendre. Dans cette science de
    la complexité, le contexte local prime sur le général. Une meilleure gestion des
    sols, en particulier agricoles, ne peut pas s'affranchir des contextes climatique
    et socio-économique. En ceci, l'expérience qu'a l'agriculteur de ses sol est irremplacable
    dans la mise en place de pratiques agricoles vertueuses, avec comme buts de protéger,
    et même de régénérer les sols tout en préservant la capacité nourricière de l'agriculture.
    L'agricuture fait partie des problèmes, mais aussi des solutions si l'on remet
    la science des sols au coeur des décisions agronomiques. Comment construire une
    économie prenant en compte ce constat, afin de donner aux agriculteurs les moyens
    de répondre aux grandes crises environnementales de notre temps ?</p>
