- id: 66
  name: Un voyage sur des millions d'années
  slug: un-voyage-sur-des-millions-dannees
  introduction: "<p>Ceux qui ne peuvent se souvenir du passé sont condamnés à le répéter.\
    \ Si ce dicton s'applique facilement aux événements vécus par nos ancêtres durant\
    \ ces derniers siècles, il est plus difficile à appliquer à l'histoire de la Terre.\
    \ Comment se souvenir d'événements qui se sont déroulés des millions d'années\
    \ avant l'apparition des premiers hommes ? Les géologues sont capables de reconstituer\
    \ les différents événements qui ont marqué l'histoire de la Terre.</p>\r\n\r\n\
    <p>Entre deux montages de vidéos expliquant l'origine des roches qui forment nos\
    \ paysages, le scientifique vulgarisateur <a href=\"https://www.youtube.com/channel/UCtXgE_tacrZi1HS8Wbdq4zQ\"\
    >Sous Nos Pieds </a>vous a préparé un quiz pour tester et parfaire vos connaissances\
    \ sur les changements climatiques qui ont marqué l'histoire de la Terre.</p>"
  conclusion: "<p>La géologie et la paléo-climatologie sont ainsi des aides précieuses\
    \ pour comprendre et prévoir l'évolution du climat actuel. La Terre a déjà connu\
    \ de nombreux changements climatiques, dont certains ont été provoqués par une\
    \ augmentation \"soudaine\" de la concentration atmosphérique en CO2. Ces périodes\
    \ ont été marquées par de plus hautes températures et l'extinction d'innombrables\
    \ espèces, mais ces changements se sont déroulés sur au moins des dizaines de\
    \ milliers d'années.<br />\r\nSi nous voulons comprendre l'impact des nos émissions\
    \ sur les climats du futur et anticiper cette crise d'une rapidité inédite, il\
    \ nous faut d'abord commencer par regarder <a href=\"https://www.youtube.com/channel/UCtXgE_tacrZi1HS8Wbdq4zQ\"\
    >sous nos pieds</a> pour reconstituer les climats du passé. Si ce quiz vous a\
    \ donné le vertige, rendez-vous sur sa chaîne pour aller plus loin.</p>"
