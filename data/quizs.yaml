- id: 76
  name: Nos Vies Bas Carbone
  slug: invbc
  introduction: <p>Connaissez-vous votre empreinte carbone ? Sauriez-vous citer une
    activité qui émet une tonne de CO2 ? Et avez-vous une petite idée de la réduction
    à opérer pour éviter un emballement du réchauffement climatique ? Ces questions
    sont essentielles et pourtant peu d'entre nous savent y répondre. C'est pour combler
    ce manque qu'a été créé le kit pédagogique Nos Vies Bas Carbone. Véritable powerpoint
    interactif du futur avec ses cartes et sa corde à linge, l'atelier permet d'appréhender
    simplement et rapidement les ordres de grandeur associés à nos émissions associées
    de tous les jours. Partez à la découverte de cet atelier tout en testant vos connaissances.</p>
  conclusion: <p>On pourrait imaginer à l'issue de ce quiz qu'une vie bas carbone,
    ce ne sont que des contraintes sur nos modes de vie. Et pourtant...Et si c'était
    au contraire une invite à s'interroger sur ce qui donne du sel à notre existence,
    sans contribuer au réchauffement du climat ou si peu ? Cuisiner, jardiner, chanter,
    courir, nager, randonner, bricoler, danser, rêver, marcher... A nous d'inventer
    nos vies bas carbone, à la fois durables et désirables ! Pour en savoir plus,
    rendez-vous <a href="https://www.nosviesbascarbone.org/">ici</a>. Vous pouvez
    aussi consulter cet <a href="https://bonpote.com/vivre-a-2-tonnes-co2e-par-an-cest-possible/">article
    de synthèse</a> sur la page du blogeur Bon pote. Ou encorece <a href="https://www.resistanceclimatique.org/gildas-38-ans%EF%BF%BC/">témoignage</a>
    de Gildas, "résistant climatique".</p>
