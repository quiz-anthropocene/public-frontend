- id: 127
  name: Born in the USA
  slug: nato-negli-stati-uniti
  introduction: '<p>Gli Stati Uniti sono entrati a far parte del nostro immaginario
    collettivo: cowboy, New York, Hollywood, Silicon Valley... il sogno americano!
    Ma gli Stati Uniti sono anche un consumatore sfrenato di petrolio, uno dei maggiori
    produttori mondiali di combustibili fossili e uno dei maggiori emettitori mondiali
    di CO2. Scopri il lato (ecologicamente) oscuro degli Stati Uniti attraverso queste
    domande.</p>'
  conclusion: "<p>Oggi, quando si pensa al petrolio si pensa al Medio Oriente, all'Arabia\
    \ Saudita... ma il paese petrolifero per eccellenza sono gli Stati Uniti! Attenzione\
    \ però, i nostri stili di vita europei non sono poi così distanti.</p>\r\n\r\n\
    <p>Ah, e già che siamo in tema petrolio, dai un'occhiata alla nostra pagina dei\
    \ quiz, ne troverai altri sull’argomento per placare la tua sete di conoscenza\
    \ ;)</p>\r\n\r\n<p> </p>"
