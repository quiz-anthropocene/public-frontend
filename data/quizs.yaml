    \ è estremamente educativo. In 3 ore si scoprono i meccanismi del clima e le conseguenze\
    \ del suo sconvolgimento, e si elaborano azioni di mitigazione e adattamento.\
    \ L'associazione che l'ha creato ha sensibilizzato sulle questioni climatiche\
    \ più di 1,5 milioni di persone nei primi 5 anni di attività.<br />\r\n<br />\r\
    \nE tu, sei sicuro di saperne abbastanza? Verificalo col nostro quiz.</p>"
