- id: 134
  name: Popolazione o sovrappopolazione?
  slug: popolazione-sovrappopolazione
  introduction: "<p>La crescita della popolazione mondiale è un fattore importante\
    \ della crisi ecologica. Ma ne è la causa principale? E si può / si deve agire\
    \ su questa crescita?<br />\r\nIn questo quiz daremo uno sguardo alle cifre più\
    \ significative di questa questione, e chissà, forse riusciremo a mettere in discussione\
    \ qualche idea preconcetta.<br />\r\n<br />\r\nUn quiz sviluppato da Emmanuel\
    \ Pont, autore del libro <a href=\"https://www.emmanuelpont.fr/\">Smettere di\
    \ fare figli per salvare il pianeta?</a> (in francese), e adattato da Elena Diato</p>"
  conclusion: "<p> </p>\r\n\r\n<p>L'obiettivo di queste domande è fornire una visione\
    \ più sfumata e articolata del dibattito sulla sovrappopolazione. Sebbene l'aumento\
    \ della popolazione umana sia uno dei fattori dell'impronta umana sul pianeta,\
    \ ridurlo non costituisce una leva d'azione molto efficace per una trasizione\
    \ ecologica.<br />\r\nLa \"popolazione massima\" che il pianeta può sopportare\
    \ dipende da come viviamo e da come funzionano le nostre società. Allo stesso\
    \ modo, su scala individuale, fare figli può avere un peso ecologico molto inferiore\
    \ rispetto alle stime circolate negli anni passati, e questo potrà essere ancora\
    \ più basso a seconda di come vivrà quel bambino.</p>\r\n\r\n<p> </p>"
