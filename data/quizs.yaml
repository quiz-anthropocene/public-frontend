- id: 120
  name: Alimentation et condition animale
  slug: alimentation-et-condition-animale
  introduction: "<p>Qu’est-ce qui se cache derrière nos assiettes en termes de condition\
    \ animale ? Quel rapport à l’animal comme ressource avons-nous progressivement\
    \ forgé à l’âge de l’humain ? Les questions qui suivent portent sur les conditions\
    \ d’élevage, de transport et d’abattage de ces animaux, ainsi que sur leur nombre.<br\
    \ />\r\nCertaines des sources données en référence proviennent du site <a href=\"\
    https://www.l214.com/\" style=\"text-decoration:none\"><u>L214</u></a>, une association\
    \ de défense des animaux utilisés comme ressources alimentaires.</p>"
  conclusion: "<p>En cherchant à maximiser la production de poisson, de viande, de\
    \ lait et d’œufs, l’humanité a transformé les animaux d’élevage en machines biologiques,\
    \ en grande majorité confinés dans des espaces réduits, nourris au soja et céréales\
    \ importés, souvent cultivés au prix de la déforestation. Cette logique de rendement\
    \ engendre la mort  de milliards d’individus sensibles, de la souffrance, des\
    \ émissions massives de gaz à effet de serre, pollue les sols et les eaux, et\
    \ met en péril d’autres êtres vivants. Ainsi, cette exploitation n’est pas seulement\
    \ un mode de production. C’est le reflet d’un système où les êtres sensibles sont\
    \ instrumentalisés, réduits à une ressource à exploiter. L’exploitation animale\
    \ est ainsi une manifestation majeure de l’Anthropocène.<br />\r\nComment agir\
    \ ? Pour les animaux comme pour l’environnement, il est urgent de végétaliser\
    \ notre alimentation. Les sites <a href=\"http://vegan-pratique.fr\" style=\"\
    text-decoration:none\"><u>vegan-pratique.fr</u></a> et de l’<a href=\"https://www.vegetarisme.fr/\"\
    \ style=\"text-decoration:none\"><u>Association Végétarienne de France</u></a>\
    \ rassemblent des informations nutritionnelles, ainsi que des recettes. Pour se\
    \ lancer, rien de mieux que de participer au <a href=\"https://veganuary.com/\"\
    \ style=\"text-decoration:none\"><u>Veganuary</u></a><u>,</u> qui consiste à tester\
