- id: 81
  name: Population et surpopulation
  slug: population-et-surpopulation
  introduction: "<p>La croissance de la population mondiale est un facteur important\
    \ de la crise écologique. En est-elle la principale responsable ? Et peut-on agir\
    \ sur elle ? Pour quel résultats et à quelle échéance ? Dans ce quiz nous allons\
    \ revenir sur les chiffres les plus marquants sur cette question épineuse, et\
    \ peut-être questionner quelques idées reçues.<br />\r\n<br />\r\nUn quiz élaboré\
    \ par Emmanuel Pont, auteur de l'ouvrage <a href=\"https://www.payot-rivages.fr/payot/livre/faut-il-arr%C3%AAter-de-faire-des-enfants-pour-sauver-la-plan%C3%A8te-9782228929684\"\
    >Faut-il arrêter de faire des enfants pour sauver la planète ?</a></p>"
  conclusion: <p>Ces questions ambitionnent d'apporter une vision plus nuancée du
    débat la surpopulation. Si l'augmentation de la population humaine est un facteur
    de l'empreinte humaine sur la planète, ce n'est pas un levier d'action très efficace,
    car il difficle de réduire la natalité, et son inertie est forte. La "population
    maximale" dépend de la manière dont nous vivons et du fonctionnement de nos sociétés.
    De même, à l'échelle individuelle, avoir un enfant a un poids écologique bien
    plus faible que les chiffres qui peuvent circuler, et qui pourra être encore plus
    limité selon la manière dont vit cet enfant.</p>
