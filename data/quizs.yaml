    >Jean-Baptiste Fressoz</a> est historien des sciences, des techniques et de l'environnement.\
    \ Il a publié en 2023 <a href=\"https://www.seuil.com/ouvrage/sans-transition-jean-baptiste-fressoz/9782021538557\"\
    >Sans Transition, une nouvelle histoire de l'énergie</a>. Dans cet ouvrage, il\
    \ revisite dans un premier temps la façon dont matières et énergies sont intrinsèquement\
    \ liées, comment elle croissent ensemble en s'empilant, en une forme de symbiose.\
    \ Il examine ensuite comment le terme de <em>transition énergétique </em>est apparu\
    \ et s'est imposé. L'enjeu est fondamental car les liens entre énergies expliquent\
    \ à la fois leur permanence sur le temps long et les obstacles titanesques qui\
    \ se dressent sur le chemin de la décarbonation.<br />\r\nLe livre fourmille de\
    \ chiffres et de faits qui vont à rebours des idées reçues. Avec l'aide de l'auteur,\
    \ nous en avons sélectionné quelques uns. A vous d'exercer votre sagacité.<br\
    \ />\r\n<br />\r\nUn quiz élaboré avec l'aimable collaboration de Laurent Gaillard.</p>"
  conclusion: <p>Née avec l'âge atomique, envisagée par des pays riches comme une
    réponse lointaine à l'épuisement des énergies fossiles, la <em>transition</em>
    écologique a été reprise, sans justification sérieuse, pour penser le défi écologique.
    Elle a avant tout justifié une forme de procrastination générale. Grâce à elle,
    le mal devient le remède, les industries émettrices deviennent vertes et l'innovation
    est notre bouée de sauvetage. Attention donc à ne pas faire reposer nos visions
    du futur sur de la mauvaise histoire, une histoire qui occulterait les réelles
    dynamiques de symbiose entre énergie et matières.</p>
