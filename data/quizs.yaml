- id: 117
  name: Introduzione all'antropocene - parte 1
  slug: introduzione-allantropocene-parte-1
  introduction: <p>L'antropocene è un termine proposto dagli scienziati per designare
    una nuova era geologica, in cui l'uomo è diventato una delle principali forze
    geologiche sulla Terra. Il periodo più recente dell'antropocene viene talvolta
    descritto come quello della grande accelerazione, poichè è il momento in cui molti
    indicatori mostrano curve di tipo esponenziale. Questo quiz offre una prima panoramica
    sull'impatto inaudito dell'uomo sul pianeta Terra.</p>
