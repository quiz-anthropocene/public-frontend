- id: 70
  name: Fresque des low techs - les leviers d'action
  slug: fresque-des-low-techs-les-leviers-daction
  introduction: "<p>La <a href=\"https://fresquedeslowtechs.org\">Fresque des low\
    \ techs</a>, c'est un atelier-jeu collaboratif sur la (non ?) soutenabilité des\
    \ technologies qui nous entourent. Il amène d'abord à s'interroger sur leurs limites,\
    \ puis d'introduire la notion de low-techs. Ce quiz vous donne un aperçu de ce\
    \ qu'on découvre en participant à un tel atelier, avec un focus sur les leviers\
    \ d'actions à notre disposition.<br />\r\n<br />\r\nUn quiz proposé par Max Pinsard,\
    \ docteur en sciences de l’énergie et matériaux de INRS-EMT Montréal et créateur\
    \ de la Fresque des low techs.</p>"
  conclusion: <p>Vous voilà désormais paré pour diffuser quelques principes des low-techs
