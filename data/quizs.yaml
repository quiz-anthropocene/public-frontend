- id: 67
  name: Des low techs tombées dans l'oubli
  slug: des-low-techs-tombees-dans-loubli
  introduction: "<p>Et si on faisait un petit détour par le passé ? Les XIX et XXe\
    \ siècles ont en effet été l'ère des grands inventeurs. Ils ont été capables de\
    \ faire le tour du monde, de construire des bâtiments gigantesques ou de s'adapter\
    \ à une pénurie d'énergie. Pourtant, beaucoup de leurs innovations sont tombées\
    \ dans l'oubli, car jugées inférieures aux systèmes d'aujourd'hui. Prêts à découvrir\
    \ quelques-unes de ces inventions méconnues ?<br />\r\n<br />\r\nUn quiz créé\
    \ par Max Pinsard, inspiré de <a class=\"notion-link-token notion-enable-hover\"\
    \ href=\"https://solar.lowtechmagazine.com/fr\" rel=\"noopener noreferrer\" style=\"\
    cursor:pointer;color:inherit;word-wrap:break-word;text-decoration:inherit\" target=\"\
    _blank\">Low-tech Magazine</a></p>"
  conclusion: <p>Morale de l'histoire ? C'est la manne d'énergie à notre disposition
    qui nous a fait mettre de côté ces technologies qui ne manquaient pas d'intérêt.
    Cela vous a captivé ? Pour aller plus loin, rendez-vous sur le site du <a href="https://solar.lowtechmagazine.com/fr/">Low
    Tech Magasine</a> ou le site <a href="https://paleo-energetique.org/">Paléo Energétique</a>.</p>
