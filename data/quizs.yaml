- id: 129
  name: Les impacts du textile
  slug: les-impacts-du-textile
  introduction: "<p>Des vêtements que nous portons aux objets que nous utilisons,\
    \ le textile fait partie de notre quotidien. <br />\r\nComme la majeure partie\
    \ de sa production est aujourd’hui réalisée hors d’Europe, ses impacts restent\
    \ souvent ignorés.<br />\r\nQuelle est l'histoire de votre dernier t-shirt ? Tentons\
    \ ensemble de mieux en comprendre l’empreinte environnementale et sociale, depuis\
    \ la production jusqu'à sa mise au rebut.</p>"
  conclusion: "<p>Voici donc premier aperçu des impacts de la filière textile : consommation\
    \ de ressources, émissions de gaz à effet de serre, pollution liée aux fibres\
    \ synthétiques, usage de produits chimiques, déchets en fin de vie. La majeure\
    \ partie d'entre eux sont à l’étranger. Les autres se manifestent chez nous, à\
    \ travers notre consommation, notre entretien et la gestion des textiles usagés.</p>\r\
    \n\r\n<p>La bonne nouvelle, c’est que chacun peut agir. Réduire les achats inutiles,\
    \ privilégier la qualité, faire durer, réparer, choisir l’occasion, refuser le\
    \ superflu et recycler ce qui ne peut plus être porté. Des gestes simples, accessibles\
    \ et qui, répétés à grande échelle, allègent réellement la pression sur l’environnement.\
    \ À nous de changer la mode pour changer le monde. <br />\r\n<br />\r\nEt vous,\
    \ qu'allez-vous changer maintenant ?<br />\r\n<br />\r\nUn quiz élaboré par l’association\
    \ <a href=\"https://www.enjeuxdurables.eu/\">EnJeux Durables</a></p>"
