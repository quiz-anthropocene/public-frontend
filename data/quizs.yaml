  name: Risorse idriche e ciclo dell'acqua
  slug: risorse-idriche-e-ciclo-dellacqua
  introduction: "<p>Le risorse idriche hanno un ruolo centrale sia nella nostra vita\
    \ quotidiana sia nel funzionamento del sistema Terra. Tuttavia, lo sfruttamento\
    \ eccessivo e la crisi climatica alterano il ciclo dell'acqua, con gravi conseguenze\
    \ sui sistemi viventi che da esso dipendono.<br />\r\nQuiz adattato da Elena Diato</p>"
  conclusion: <p>Questi sono alcuni dei diversi impatti che l’essere umano ha sulle
    risorse idriche del pianeta. Dalla neve sulle cime delle montagne alle acque sotterranee,
    dai canali di irrigazione ai nostri rubinetti, tutte le società, i geosistemi
    e gli ecosistemi che dipendono dal ciclo dell'acqua.</p>
