- id: 92
  name: Les impacts environnementaux de la culture
  slug: les-impacts-environnementaux-de-la-culture
  introduction: "<p>Presse, édition, audiovisuel, spectacle vivant, patrimoine, architecture\
    \ ou encore jeux vidéo...Les activités artistiques et culturelles tiennent une\
    \ part et jouent un rôle essentiels dans nos sociétés. Pour autant, elles ne sont\
    \ pas neutres du point de vue environnemental. A quoi ressemblent nos anthopo(s)cènes?\
    \ Ce quiz met le doigt sur quelques enjeux environnementaux qui se cachent derrière\
    \ elle. Et de pistes d'action. En scène !<br />\r\n<br />\r\nUn quiz créé par\
    \ David Irle. David accompagne les professionnels de la culture et notamment du\
    \ spectacle vivant vers un modèle d'organisation bas carbone, inclusif et soutenable.</p>"
  conclusion: '<p> Les impacts environnementaux de la culture sont divers et liés
    à des contextes particuliers. Bonne nouvelle : ils donnent actuellement lieu à
    de vifs débats parmi ses professionnels. Une meilleure connaissance des enjeux
    permet d''en réduire les impacts, tout en stimulant ses apports, tels que la convivialité,
    le vivre-ensemble, l''exercice de nos libertés, ou encore sa capacité inégalée
    à nous forger de nouveaux imaginaires et à déplacer nos façons de voir le monde.
    Pour aller plus loin, voici l''ouvrage dont David est le coauteur : <a href="https://www.pug.fr/produit/1954/9782706149702/decarboner-la-culture">Décarboner
    la Culture</a>. Voir aussi cet <a href="https://bonpote.com/peut-on-separer-le-bilan-carbone-de-lartiste/">article
    </a>du blogueur Bonpote sur le bilan carbone d''un artiste.</p>'
