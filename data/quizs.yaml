- id: 86
  name: Fresque de la Renaissance Ecologique
  slug: fresque-de-la-renaissance-ecologique-le-quizz
  introduction: "<p>Les derniers rapports scientifiques, notamment du GIEC sur le\
    \ climat, et de l'IPBES sur la biodiversité, nous alertent sur la dégradation\
    \ que l'homme inflige à la planète. Dans ce contexte, la Fresque de la Renaissance\
    \ Ecologique se donne comme objectif de comprendre et de mettre en lien ces problématiques\
    \ à quel point il était plus que nécessaire de comprendre les problématiques liées\
    \ au changement climatique, à l’effondrement de la biodiversité, à l’épuisement\
    \ des ressources et aux inégalités.</p>\r\n\r\n<p>​<strong>Nous devons comprendre\
    \ et agir collectivement.</strong></p>\r\n\r\n<p>Par son approche holistique et\
    \ positive, la Renaissance Écologique traite tous les sujets sociétaux qui vont\
    \ accélérer la transformation de nos modèles et mettre en mouvement tous les acteurs.</p>\r\
    \n\r\n<p>Le quiz suivant vous invite à la découverte de ces enjeux.</p>"
  conclusion: "<p>Si chacun des 24 chantiers est important, il est essentiel de les\
    \ penser et les traiter de façon coordonnée.</p>\r\n\r\n<p>La fresque de la renaissance\
    \ écologique répond ainsi à de nombreux besoins :</p>\r\n\r\n<p>. Un outil simple\
    \ pour des enjeux complexes : un dessin de grande dimension<br />\r\n. Une projection\
    \ concrète et positive<br />\r\n. La construction d'une vision partagée pour travailler<br\
    \ />\r\n. Des éléments et scènes de vie concrets pour se projeter facilement dans\
    \ un avenir souhaitable<br />\r\n. Une mise en lumière des convergences entre\
    \ les sujets de société.</p>\r\n\r\n<p>Que ce soit pour s'initier, approfondir,\
    \ co-construire, la <a href=\"https://www.renaissanceecologique.fr/\">Fresque\
    \ de la Renaissance Ecologique</a> créé du lien et permet de sortir du cloisonnement\
    \ habituel, tout en fournissant un moment convivial à organiser près de chez soi.</p>"
