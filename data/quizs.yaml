- id: 79
  name: Introduction à la Fresque du Climat
  slug: introduction-a-la-fresque-du-climat
  introduction: <p>La Fresque du Climat, c’est un atelier ludique, participatif et
    créatif sur le changement climatique. Il est basé sur l’intelligence collective
    et est extrêmement pédagogique. En 3 heures, vous découvrez les mécanismes du
    climat et les conséquences de son dérèglement, vous débattez entre vous et élaborez
    des pistes d'action pour le limiter et s'y adapter. Déjà plus de 800,000 personnes
    y ont participé à travers le monde et 40,000 sont devenues animateurs et animatrices.
    A vous de tester vos connaissances !</p>
