- id: 3
  name: Le quiz de Vincent Mignerot
  slug: le-quiz-de-vincent-mignerot
  introduction: "<p>Vincent Mignerot est essayiste et conférencier. Il développe une\
    \ théorie écologique de l’esprit et se questionne sur la singularité de l'humanité\
    \ dans son contexte évolutif. Il est le fondateur d'<a href=\"https://adrastia.org\"\
    >Adrastia</a>, une association qui s’intéresse aux risques d’effondrement de la\
    \ civilisation thermo-industrielle, ainsi que du groupe Facebook Transition 2030.</p>\r\
    \n\r\n<p>Vincent nous a concocté un quiz teinté d'anthropologie, qui nous fait\
    \ réfléchir sur les racines de cette emprise dérégulée que notre espèce imprime\
    \ sur son environnement.<br />\r\nMise à jour janvier 2021 : Les réponses sont\
    \ désormais agrémentées de commentaires audio de l'auteur pour aller plus loin. </p>"
  conclusion: <p>Si ce quiz vous a intéressé, vous le serez problablement par <a href="https://quizanthropocene.fr/quiz/18">celui-ci,</a>
    qui traite de questions similaires.</p>
